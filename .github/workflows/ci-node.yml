name: CI — Node.js

on:
  push:
    branches: [main]
    paths:
      - 'engram-node/**'
      - '.github/workflows/ci-node.yml'
  pull_request:
    paths:
      - 'engram-node/**'
      - '.github/workflows/ci-node.yml'

jobs:
  test:
    name: jest (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['23', '24']

    defaults:
      run:
        working-directory: engram-node

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: engram-node/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --no-coverage
